<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">MCA Territory Detail</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#64748B">Superior &amp; Inferior Divisions with Deep Perforators</text>

  <!-- Brain lateral outline -->
  <path d="M100,320 Q100,170 240,110 Q360,70 480,110 Q600,160 620,270 Q630,350 580,400 Q520,460 400,480 Q280,490 180,460 Q100,420 100,320Z"
        fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>

  <!-- Sylvian fissure -->
  <path d="M150,340 Q280,280 420,290 Q490,300 540,330"
        fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- MCA trunk from ICA -->
  <path d="M200,430 Q210,380 230,340"
        stroke="#DC2626" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="145" y="440" font-size="12" font-weight="600" fill="#DC2626">MCA trunk</text>

  <!-- Bifurcation point -->
  <circle cx="230" cy="340" r="5" fill="#DC2626"/>
  <text x="240" y="358" font-size="10" font-weight="600" fill="#DC2626">Bifurcation</text>

  <!-- Superior division -->
  <path d="M230,340 Q280,280 350,230 Q400,200 460,180"
        stroke="#DC2626" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Superior territory shading -->
  <path d="M240,300 Q300,200 400,160 Q480,140 540,180 Q560,220 500,260 Q400,300 300,310Z"
        fill="#DC2626" fill-opacity="0.12" stroke="#DC2626" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="4,2"/>
  <text x="390" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626">Superior Division</text>
  <text x="390" y="226" text-anchor="middle" font-size="10" fill="#B91C1C">Motor strip (face, arm)</text>
  <text x="390" y="240" text-anchor="middle" font-size="10" fill="#B91C1C">Broca area (speech output)</text>
  <text x="390" y="254" text-anchor="middle" font-size="10" fill="#B91C1C">Frontal eye field</text>

  <!-- Inferior division -->
  <path d="M230,340 Q300,340 400,360 Q480,380 540,370"
        stroke="#0284C7" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Inferior territory shading -->
  <path d="M280,340 Q360,320 460,340 Q560,360 580,380 Q560,420 480,450 Q380,470 300,440 Q250,400 280,340Z"
        fill="#0284C7" fill-opacity="0.12" stroke="#0284C7" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="4,2"/>
  <text x="430" y="400" text-anchor="middle" font-size="14" font-weight="700" fill="#0284C7">Inferior Division</text>
  <text x="430" y="416" text-anchor="middle" font-size="10" fill="#0369A1">Wernicke area (comprehension)</text>
  <text x="430" y="430" text-anchor="middle" font-size="10" fill="#0369A1">Temporal / parietal cortex</text>
  <text x="430" y="444" text-anchor="middle" font-size="10" fill="#0369A1">Angular gyrus (Gerstmann)</text>

  <!-- Lenticulostriate arteries (deep perforators) -->
  <line x1="215" y1="360" x2="205" y2="310" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="220" y1="355" x2="215" y2="300" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="225" y1="350" x2="225" y2="295" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="230" y1="345" x2="235" y2="290" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>

  <!-- Deep structure box -->
  <rect x="130" y="260" width="110" height="50" rx="8" fill="#D97706" fill-opacity="0.12" stroke="#D97706" stroke-opacity="0.4"/>
  <text x="185" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">Deep Perforators</text>
  <text x="185" y="295" text-anchor="middle" font-size="9" fill="#92400E">Lenticulostriate aa.</text>
  <text x="185" y="307" text-anchor="middle" font-size="9" fill="#92400E">Basal ganglia + IC</text>

  <!-- Right panel: Clinical correlates -->
  <rect x="640" y="80" width="145" height="200" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="712" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#0F172A">Clinical Deficits</text>

  <rect x="650" y="115" width="125" height="45" rx="6" fill="#DC2626" fill-opacity="0.08" stroke="#DC2626" stroke-opacity="0.2"/>
  <text x="660" y="132" font-size="10" font-weight="700" fill="#DC2626">Superior Div.</text>
  <text x="660" y="146" font-size="9" fill="#0F172A">Broca aphasia</text>
  <text x="660" y="156" font-size="9" fill="#0F172A">Face/arm weakness</text>

  <rect x="650" y="168" width="125" height="45" rx="6" fill="#0284C7" fill-opacity="0.08" stroke="#0284C7" stroke-opacity="0.2"/>
  <text x="660" y="185" font-size="10" font-weight="700" fill="#0284C7">Inferior Div.</text>
  <text x="660" y="199" font-size="9" fill="#0F172A">Wernicke aphasia</text>
  <text x="660" y="209" font-size="9" fill="#0F172A">Neglect (R side)</text>

  <rect x="650" y="221" width="125" height="50" rx="6" fill="#D97706" fill-opacity="0.08" stroke="#D97706" stroke-opacity="0.2"/>
  <text x="660" y="238" font-size="10" font-weight="700" fill="#D97706">Lenticulostriates</text>
  <text x="660" y="252" font-size="9" fill="#0F172A">Pure motor hemiparesis</text>
  <text x="660" y="262" font-size="9" fill="#0F172A">Internal capsule lacune</text>

  <!-- Board Pearl -->
  <rect x="30" y="510" width="740" height="60" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-opacity="0.3"/>
  <text x="50" y="532" font-size="11" font-weight="700" fill="#D97706">Board Pearl</text>
  <text x="50" y="548" font-size="10" fill="#0F172A">MCA supplies the largest cortical territory. Superior division stroke = nonfluent aphasia (Broca) + face/arm > leg weakness.</text>
  <text x="50" y="562" font-size="10" fill="#0F172A">Inferior division stroke = fluent aphasia (Wernicke) + neglect. Lenticulostriate occlusion = lacunar pure motor hemiparesis.</text>
</svg>
