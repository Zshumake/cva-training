<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">Circle of Willis</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#64748B">Cerebral Arterial Circle - Ventral View</text>

  <!-- Basilar artery (blue - posterior) -->
  <line x1="400" y1="520" x2="400" y2="400" stroke="#2563EB" stroke-width="5" stroke-linecap="round"/>
  <text x="420" y="470" font-size="13" font-weight="600" fill="#2563EB">Basilar a.</text>

  <!-- Vertebral arteries (blue) -->
  <line x1="360" y1="570" x2="400" y2="520" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <line x1="440" y1="570" x2="400" y2="520" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <text x="310" y="575" font-size="12" font-weight="600" fill="#2563EB">L Vertebral a.</text>
  <text x="448" y="575" font-size="12" font-weight="600" fill="#2563EB">R Vertebral a.</text>

  <!-- PCA left and right (blue - posterior) -->
  <path d="M400,400 Q340,380 280,360" stroke="#2563EB" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M400,400 Q460,380 520,360" stroke="#2563EB" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="240" y="355" font-size="13" font-weight="600" fill="#2563EB">L PCA</text>
  <text x="525" y="355" font-size="13" font-weight="600" fill="#2563EB">R PCA</text>

  <!-- PComm arteries (blue connecting to red) -->
  <line x1="330" y1="370" x2="310" y2="310" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" stroke-dasharray="6,3"/>
  <line x1="470" y1="370" x2="490" y2="310" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" stroke-dasharray="6,3"/>
  <text x="270" y="345" font-size="11" font-weight="600" fill="#7C3AED">L PComm</text>
  <text x="478" y="345" font-size="11" font-weight="600" fill="#7C3AED">R PComm</text>

  <!-- ICA left and right (red - anterior) -->
  <line x1="240" y1="480" x2="300" y2="300" stroke="#DC2626" stroke-width="5" stroke-linecap="round"/>
  <line x1="560" y1="480" x2="500" y2="300" stroke="#DC2626" stroke-width="5" stroke-linecap="round"/>
  <text x="195" y="500" font-size="13" font-weight="600" fill="#DC2626">L ICA</text>
  <text x="565" y="500" font-size="13" font-weight="600" fill="#DC2626">R ICA</text>

  <!-- MCA left and right (red) -->
  <path d="M300,300 Q240,270 170,240" stroke="#DC2626" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M500,300 Q560,270 630,240" stroke="#DC2626" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="110" y="235" font-size="14" font-weight="700" fill="#DC2626">L MCA</text>
  <text x="635" y="235" font-size="14" font-weight="700" fill="#DC2626">R MCA</text>

  <!-- ACA left and right (red) -->
  <path d="M300,300 Q330,240 370,200" stroke="#DC2626" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M500,300 Q470,240 430,200" stroke="#DC2626" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="340" y="185" font-size="13" font-weight="600" fill="#DC2626">L ACA</text>
  <text x="430" y="185" font-size="13" font-weight="600" fill="#DC2626">R ACA</text>

  <!-- ACA continuation upward -->
  <line x1="370" y1="200" x2="360" y2="130" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="430" y1="200" x2="440" y2="130" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>

  <!-- AComm (red connecting) -->
  <line x1="370" y1="200" x2="430" y2="200" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <text x="375" y="215" font-size="11" font-weight="600" fill="#DC2626">AComm</text>

  <!-- Junction dots -->
  <circle cx="400" cy="520" r="5" fill="#2563EB"/>
  <circle cx="400" cy="400" r="5" fill="#2563EB"/>
  <circle cx="300" cy="300" r="5" fill="#DC2626"/>
  <circle cx="500" cy="300" r="5" fill="#DC2626"/>
  <circle cx="370" cy="200" r="4" fill="#DC2626"/>
  <circle cx="430" cy="200" r="4" fill="#DC2626"/>

  <!-- Legend -->
  <rect x="30" y="80" width="180" height="90" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="45" y="100" font-size="12" font-weight="700" fill="#0F172A">Legend</text>
  <line x1="45" y1="118" x2="75" y2="118" stroke="#DC2626" stroke-width="4" stroke-linecap="round"/>
  <text x="82" y="122" font-size="11" fill="#DC2626" font-weight="600">Anterior Circulation</text>
  <line x1="45" y1="140" x2="75" y2="140" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <text x="82" y="144" font-size="11" fill="#2563EB" font-weight="600">Posterior Circulation</text>
  <line x1="45" y1="160" x2="75" y2="160" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" stroke-dasharray="6,3"/>
  <text x="82" y="164" font-size="11" fill="#7C3AED" font-weight="600">Communicating aa.</text>

  <!-- Clinical note -->
  <rect x="570" y="80" width="210" height="70" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-opacity="0.3"/>
  <text x="585" y="100" font-size="11" font-weight="700" fill="#D97706">Board Pearl</text>
  <text x="585" y="116" font-size="10" fill="#0F172A">Most common aneurysm site:</text>
  <text x="585" y="130" font-size="10" font-weight="700" fill="#DC2626">AComm (30-35%)</text>
  <text x="585" y="144" font-size="10" fill="#0F172A">PComm is #2 (25-30%)</text>
</svg>
