<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">CT vs MRI in Stroke Diagnosis</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748B">Imaging Appearance of Ischemic and Hemorrhagic Stroke</text>

  <!-- Dividing line -->
  <line x1="400" y1="70" x2="400" y2="440" stroke="#E2E8F0" stroke-width="2"/>

  <!-- ═══ CT SIDE ═══ -->
  <text x="200" y="85" text-anchor="middle" font-size="18" font-weight="700" fill="#0284C7">CT (Non-contrast)</text>
  <text x="200" y="102" text-anchor="middle" font-size="11" fill="#64748B">First-line in acute stroke</text>

  <!-- CT - Ischemic -->
  <text x="200" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Ischemic Stroke</text>

  <!-- CT brain circle (dark background) -->
  <circle cx="200" cy="210" r="75" fill="#1E293B" stroke="#475569" stroke-width="2"/>

  <!-- Normal brain tissue (mid-gray) -->
  <ellipse cx="200" cy="210" rx="65" ry="60" fill="#475569"/>

  <!-- Ischemic area (DARK / hypodense) -->
  <ellipse cx="235" cy="200" rx="28" ry="22" fill="#1E293B" fill-opacity="0.8" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="235" y="204" text-anchor="middle" font-size="9" font-weight="700" fill="#F59E0B">DARK</text>
  <text x="235" y="215" text-anchor="middle" font-size="7" fill="#F59E0B">Hypodense</text>

  <!-- Arrow and label -->
  <line x1="270" y1="195" x2="310" y2="175" stroke="#F59E0B" stroke-width="1"/>
  <text x="295" y="168" font-size="9" fill="#0F172A" font-weight="600">Hypodense area</text>
  <text x="295" y="180" font-size="8" fill="#64748B">May not appear for 6-12h</text>

  <!-- CT - Hemorrhagic -->
  <text x="200" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Hemorrhagic Stroke</text>

  <!-- CT brain circle -->
  <circle cx="200" cy="395" r="75" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <ellipse cx="200" cy="395" rx="65" ry="60" fill="#475569"/>

  <!-- Hemorrhagic area (BRIGHT / hyperdense) -->
  <ellipse cx="225" cy="385" rx="25" ry="20" fill="#F8FAFC" stroke="#DC2626" stroke-width="1.5"/>
  <text x="225" y="382" text-anchor="middle" font-size="9" font-weight="700" fill="#DC2626">BRIGHT</text>
  <text x="225" y="393" text-anchor="middle" font-size="7" fill="#DC2626">Hyperdense</text>

  <line x1="255" y1="378" x2="310" y2="358" stroke="#DC2626" stroke-width="1"/>
  <text x="290" y="352" font-size="9" fill="#0F172A" font-weight="600">Hyperdense (white)</text>
  <text x="290" y="364" font-size="8" fill="#64748B">Visible immediately</text>

  <!-- ═══ MRI SIDE ═══ -->
  <text x="600" y="85" text-anchor="middle" font-size="18" font-weight="700" fill="#7C3AED">MRI (DWI / FLAIR)</text>
  <text x="600" y="102" text-anchor="middle" font-size="11" fill="#64748B">Most sensitive for acute ischemia</text>

  <!-- MRI DWI - Ischemic -->
  <text x="600" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">DWI (Diffusion-Weighted)</text>

  <!-- MRI brain circle (dark) -->
  <circle cx="600" cy="210" r="75" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <ellipse cx="600" cy="210" rx="65" ry="60" fill="#334155"/>

  <!-- Ischemic area on DWI (BRIGHT - restricted diffusion) -->
  <ellipse cx="635" cy="200" rx="28" ry="22" fill="#F8FAFC" stroke="#F59E0B" stroke-width="2"/>
  <text x="635" y="197" text-anchor="middle" font-size="9" font-weight="700" fill="#D97706">BRIGHT</text>
  <text x="635" y="209" text-anchor="middle" font-size="7" fill="#D97706">Restricted</text>
  <text x="635" y="219" text-anchor="middle" font-size="7" fill="#D97706">Diffusion</text>

  <line x1="668" y1="195" x2="710" y2="175" stroke="#D97706" stroke-width="1"/>
  <text x="695" y="168" font-size="9" fill="#0F172A" font-weight="600">Bright on DWI</text>
  <text x="695" y="180" font-size="8" fill="#64748B">Visible within minutes</text>

  <!-- MRI ADC Map -->
  <text x="600" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">ADC Map (Confirmation)</text>

  <circle cx="600" cy="395" r="75" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <ellipse cx="600" cy="395" rx="65" ry="60" fill="#94A3B8"/>

  <!-- Ischemic area on ADC (DARK - confirms restriction) -->
  <ellipse cx="635" cy="385" rx="28" ry="22" fill="#1E293B" stroke="#0284C7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="635" y="382" text-anchor="middle" font-size="9" font-weight="700" fill="#93C5FD">DARK</text>
  <text x="635" y="394" text-anchor="middle" font-size="7" fill="#93C5FD">Low ADC</text>

  <line x1="668" y1="378" x2="710" y2="358" stroke="#0284C7" stroke-width="1"/>
  <text x="695" y="352" font-size="9" fill="#0F172A" font-weight="600">Dark on ADC</text>
  <text x="695" y="364" font-size="8" fill="#64748B">Confirms true restriction</text>

  <!-- ═══ BOTTOM SUMMARY ═══ -->
  <rect x="30" y="460" width="740" height="125" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>

  <!-- Key comparison table -->
  <text x="400" y="485" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A">Quick Comparison</text>

  <!-- Headers -->
  <text x="180" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#64748B">Feature</text>
  <text x="370" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#0284C7">CT</text>
  <text x="570" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#7C3AED">MRI DWI</text>

  <line x1="60" y1="515" x2="740" y2="515" stroke="#E2E8F0" stroke-width="1"/>

  <text x="90" y="532" font-size="10" fill="#0F172A">Acute ischemia detection</text>
  <text x="370" y="532" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="600">6-12 hours delay</text>
  <text x="570" y="532" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">Minutes (most sensitive)</text>

  <text x="90" y="550" font-size="10" fill="#0F172A">Acute hemorrhage detection</text>
  <text x="370" y="550" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">Immediate (gold standard)</text>
  <text x="570" y="550" text-anchor="middle" font-size="10" fill="#D97706" font-weight="600">Variable (use GRE/SWI)</text>

  <text x="90" y="568" font-size="10" fill="#0F172A">Speed / availability</text>
  <text x="370" y="568" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">Fast (5 min), widely available</text>
  <text x="570" y="568" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="600">Slower (20-30 min), less available</text>

  <!-- Board Pearl at very bottom -->
  <rect x="30" y="462" width="740" height="20" rx="0" fill="#FFF7ED" stroke="none"/>
  <text x="50" y="476" font-size="10" font-weight="700" fill="#D97706">Board Pearl: CT first to rule out hemorrhage, then MRI DWI for ischemia. DWI bright + ADC dark = true acute infarct (not T2 shine-through).</text>
</svg>
