<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">Intracerebral Hemorrhage Locations</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748B">Common ICH Sites with Frequency and Associated Deficits</text>

  <!-- Brain outline (coronal-ish view) -->
  <path d="M150,380 Q150,160 400,90 Q650,160 650,380 Q650,440 580,460 Q500,480 400,480 Q300,480 220,460 Q150,440 150,380Z"
        fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>

  <!-- Lateral ventricles outline -->
  <path d="M320,220 Q340,260 360,280 Q380,290 400,280 Q420,260 440,220"
        fill="#E0F2FE" stroke="#0284C7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="380" y="275" font-size="8" fill="#0284C7">Ventricle</text>

  <!-- Midline -->
  <line x1="400" y1="90" x2="400" y2="480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.4"/>

  <!-- ═══ PUTAMEN (most common) ═══ -->
  <ellipse cx="310" cy="300" rx="35" ry="25" fill="#DC2626" fill-opacity="0.35" stroke="#DC2626" stroke-width="2.5"/>
  <text x="310" y="296" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">Putamen</text>
  <text x="310" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#DC2626">35-50%</text>

  <!-- Leader line to putamen details -->
  <line x1="275" y1="300" x2="80" y2="280" stroke="#DC2626" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="20" y="250" width="170" height="70" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-opacity="0.3"/>
  <text x="35" y="268" font-size="11" font-weight="700" fill="#DC2626">Putamen (35-50%)</text>
  <text x="35" y="284" font-size="9" fill="#0F172A">Contralateral hemiparesis</text>
  <text x="35" y="297" font-size="9" fill="#0F172A">Hemisensory loss</text>
  <text x="35" y="310" font-size="9" fill="#0F172A">Homonymous hemianopia</text>
  <text x="35" y="323" font-size="9" fill="#64748B" font-style="italic">Eyes deviate toward lesion</text>

  <!-- ═══ THALAMUS ═══ -->
  <ellipse cx="370" cy="310" rx="22" ry="18" fill="#7C3AED" fill-opacity="0.35" stroke="#7C3AED" stroke-width="2"/>
  <text x="370" y="307" text-anchor="middle" font-size="9" font-weight="700" fill="#FFFFFF">Thal.</text>
  <text x="370" y="320" text-anchor="middle" font-size="8" font-weight="700" fill="#7C3AED">15-25%</text>

  <line x1="370" y1="328" x2="370" y2="400" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="285" y="400" width="170" height="75" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-opacity="0.3"/>
  <text x="300" y="418" font-size="11" font-weight="700" fill="#7C3AED">Thalamus (15-25%)</text>
  <text x="300" y="434" font-size="9" fill="#0F172A">Hemisensory loss (prominent)</text>
  <text x="300" y="447" font-size="9" fill="#0F172A">Hemiparesis (IC extension)</text>
  <text x="300" y="460" font-size="9" fill="#0F172A">Eyes deviate downward/inward</text>
  <text x="300" y="473" font-size="9" fill="#64748B" font-style="italic">IVH risk (adjacent ventricle)</text>

  <!-- ═══ LOBAR ═══ -->
  <ellipse cx="520" cy="220" rx="40" ry="30" fill="#0284C7" fill-opacity="0.25" stroke="#0284C7" stroke-width="2"/>
  <text x="520" y="217" text-anchor="middle" font-size="10" font-weight="700" fill="#0284C7">Lobar</text>
  <text x="520" y="232" text-anchor="middle" font-size="9" font-weight="700" fill="#0284C7">20-30%</text>

  <line x1="560" y1="220" x2="660" y2="180" stroke="#0284C7" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="610" y="145" width="170" height="75" rx="8" fill="#EFF6FF" stroke="#0284C7" stroke-opacity="0.3"/>
  <text x="625" y="163" font-size="11" font-weight="700" fill="#0284C7">Lobar (20-30%)</text>
  <text x="625" y="179" font-size="9" fill="#0F172A">Variable by lobe location</text>
  <text x="625" y="192" font-size="9" fill="#0F172A">CAA in elderly (recurrent)</text>
  <text x="625" y="205" font-size="9" fill="#0F172A">Higher seizure risk</text>
  <text x="625" y="218" font-size="9" fill="#64748B" font-style="italic">Think amyloid angiopathy if &gt;65</text>

  <!-- ═══ CEREBELLUM ═══ -->
  <ellipse cx="480" cy="420" rx="30" ry="22" fill="#059669" fill-opacity="0.3" stroke="#059669" stroke-width="2"/>
  <text x="480" y="417" text-anchor="middle" font-size="9" font-weight="700" fill="#FFFFFF">Cerebellum</text>
  <text x="480" y="432" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">5-10%</text>

  <line x1="510" y1="420" x2="620" y2="420" stroke="#059669" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="610" y="390" width="170" height="70" rx="8" fill="#ECFDF5" stroke="#059669" stroke-opacity="0.3"/>
  <text x="625" y="408" font-size="11" font-weight="700" fill="#059669">Cerebellum (5-10%)</text>
  <text x="625" y="424" font-size="9" fill="#0F172A">Ataxia, vertigo, vomiting</text>
  <text x="625" y="437" font-size="9" fill="#0F172A">Risk of obstructive hydrocephalus</text>
  <text x="625" y="450" font-size="9" fill="#DC2626" font-weight="600">Surgical evacuation if &gt;3cm</text>

  <!-- ═══ PONS ═══ -->
  <ellipse cx="400" cy="430" rx="22" ry="18" fill="#D97706" fill-opacity="0.35" stroke="#D97706" stroke-width="2"/>
  <text x="400" y="427" text-anchor="middle" font-size="9" font-weight="700" fill="#FFFFFF">Pons</text>
  <text x="400" y="441" text-anchor="middle" font-size="8" font-weight="700" fill="#D97706">5-10%</text>

  <line x1="400" y1="448" x2="400" y2="500" stroke="#D97706" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="20" y="490" width="170" height="70" rx="8" fill="#FFF7ED" stroke="#D97706" stroke-opacity="0.3"/>
  <text x="35" y="508" font-size="11" font-weight="700" fill="#D97706">Pons (5-10%)</text>
  <text x="35" y="524" font-size="9" fill="#0F172A">Quadriparesis, coma</text>
  <text x="35" y="537" font-size="9" fill="#0F172A">Pinpoint reactive pupils</text>
  <text x="35" y="550" font-size="9" fill="#DC2626" font-weight="600">Worst prognosis of all ICH</text>

  <!-- Board Pearl -->
  <rect x="210" y="510" width="570" height="70" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-opacity="0.3"/>
  <text x="230" y="530" font-size="11" font-weight="700" fill="#D97706">Board Pearl</text>
  <text x="230" y="546" font-size="10" fill="#0F172A">Hypertensive ICH: putamen &gt; thalamus &gt; pons &gt; cerebellum. Lobar ICH in elderly = think cerebral amyloid angiopathy.</text>
  <text x="230" y="562" font-size="10" fill="#0F172A">ICH Score (mortality predictor): GCS, age, volume, IVH, infratentorial location. Cerebellar ICH &gt;3cm = surgical emergency.</text>
</svg>
